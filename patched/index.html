<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToDo管理</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:#f2f4f8;color:#1c2333;display:flex;justify-content:center;padding:32px 12px;}
  .app{width:100%;max-width:520px;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.08);overflow:hidden;}
  header{background:linear-gradient(135deg,#4a6cf7,#6ea8ff);color:#fff;padding:20px 22px;}
  header h1{font-size:20px;font-weight:800;}
  header p{font-size:12px;opacity:.85;margin-top:2px;}
  .add{display:flex;gap:8px;padding:16px 18px;border-bottom:1px solid #eef1f6;}
  #new-todo{flex:1;border:1px solid #d7deea;border-radius:9px;padding:11px 12px;font-size:15px;}
  #new-todo:focus{outline:none;border-color:#4a6cf7;box-shadow:0 0 0 3px #4a6cf733;}
  #add-btn{background:#4a6cf7;color:#fff;border:none;border-radius:9px;padding:0 18px;font-weight:700;cursor:pointer;font-size:15px;}
  #add-btn:active{transform:translateY(1px);}
  .filters{display:flex;gap:6px;padding:12px 18px;border-bottom:1px solid #eef1f6;}
  .filters button{background:#eef1f6;border:none;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;color:#5a6478;}
  .filters button.active{background:#4a6cf7;color:#fff;}
  ul{list-style:none;min-height:60px;}
  li{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid #f2f4f8;}
  li .toggle{width:19px;height:19px;cursor:pointer;flex:0 0 auto;}
  li .todo-text{flex:1;font-size:15px;word-break:break-word;}
  li.done .todo-text{text-decoration:line-through;color:#9aa3b5;}
  li .delete{background:none;border:none;color:#c94b4b;cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:6px;}
  li .delete:hover{background:#fdeaea;}
  .empty{padding:26px;text-align:center;color:#9aa3b5;font-size:14px;}
  footer{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;color:#7a8398;font-size:13px;}
  #clear-completed{background:none;border:none;color:#7a8398;cursor:pointer;font-size:13px;}
  #clear-completed:hover{color:#c94b4b;text-decoration:underline;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ToDo管理</h1>
    <p>やることを追加して管理しましょう</p>
  </header>
  <div class="add">
    <input id="new-todo" type="text" placeholder="新しいタスクを入力…" autocomplete="off" data-testid="new-todo">
    <button id="add-btn" data-testid="add">追加</button>
  </div>
  <div class="filters" data-testid="filters">
    <button data-filter="all" class="active">すべて</button>
    <button data-filter="active">未完了</button>
    <button data-filter="completed">完了</button>
  </div>
  <ul id="todo-list" data-testid="list"></ul>
  <footer>
    <span id="count" data-testid="count"></span>
    <button id="clear-completed" data-testid="clear-completed">完了を削除</button>
  </footer>
</div>

<script>
"use strict";
const KEY = "todos";
let todos = load();
let filter = "all";

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(todos)); }
function uid(){ return "t" + Date.now() + Math.random().toString(36).slice(2,6); }

// --- API通信（サーバ同期のシミュレーション） ---
function api(method, path, body){
  try{
    fetch(path, {
      method: method,
      headers: body ? { "Content-Type": "application/json" } : undefined,
      body: body ? JSON.stringify(body) : undefined
    }).catch(function(){});
  }catch(e){}
}

// 入力の受け取り（前後の空白のみ除去）
// [セキュリティパッチ] インジェクション対策として危険文字を除去
function normalizeInput(raw){
  return raw.trim().replace(/['"<>]/g, "");   // ★不具合1: 「'」等を含む正当な入力まで壊す
}
// [セキュリティパッチ] XSS対策のHTMLエスケープ
function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function addTodo(){
  const input = document.getElementById("new-todo");
  const text = normalizeInput(input.value);
  if(!text) return;
  todos.push({ id: uid(), text: text, completed: false });
  input.value = "";
  api("POST", "api/todo", { title: text, done: false }); // ★不具合4(API): 追加のみ誤ったパス(todo)＋誤フィールド(title/done)。他のAPIは正常に合わせてある
  save(); render();
}

function toggle(id){
  const t = todos.find(x => x.id === id);
  if(t){ t.completed = !t.completed; api("PATCH", "api/todos/" + id, { completed: t.completed }); save(); render(); } // 完了切替APIは正常（NGにしない）
}
function remove(id){
  todos = todos.filter(x => x.id !== id);
  api("DELETE", "api/todos/" + id); // 削除APIは正常（NGにしない）
  save(); render();
}
function clearCompleted(){
  todos = todos.filter(x => !x.completed);
  save(); render();
}

// フィルタ判定
function matchesFilter(t){
  if(filter === "active") return t.completed;   // ★不具合3: 未完了フィルタが完了を表示（判定反転）
  if(filter === "completed") return t.completed;
  return true;
}

function render(){
  const list = document.getElementById("todo-list");
  const visible = todos.filter(matchesFilter);
  list.innerHTML = "";
  if(visible.length === 0){
    const div = document.createElement("div");
    div.className = "empty";
    div.textContent = todos.length ? "該当するタスクはありません" : "タスクはまだありません";
    list.appendChild(div);
  }
  for(const t of visible){
    const li = document.createElement("li");
    li.dataset.id = t.id;
    if(t.completed) li.classList.add("done");

    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.className = "toggle"; cb.checked = t.completed;
    cb.setAttribute("data-testid", "toggle");
    cb.onchange = () => toggle(t.id);

    const span = document.createElement("span");
    span.className = "todo-text";
    span.setAttribute("data-testid", "text");
    // [セキュリティパッチ] XSS対策でエスケープしてから表示
    span.textContent = escapeHtml(t.text);   // ★不具合2: textContentに二重エスケープ→実体参照が見えてしまう

    const del = document.createElement("button");
    del.className = "delete"; del.textContent = "×"; del.title = "削除";
    del.setAttribute("data-testid", "delete");
    del.onclick = () => remove(t.id);

    li.append(cb, span, del);
    list.appendChild(li);
  }
  const left = todos.filter(x => !x.completed).length;
  document.getElementById("count").textContent = left + " 件の未完了";
}

document.getElementById("add-btn").onclick = addTodo;
document.getElementById("new-todo").addEventListener("keydown", e => { if(e.key === "Enter") addTodo(); });
document.getElementById("clear-completed").onclick = clearCompleted;
document.querySelectorAll(".filters button").forEach(b => {
  b.onclick = () => {
    filter = b.dataset.filter;
    document.querySelectorAll(".filters button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
});
api("GET", "api/todos.json"); // 起動時取得は正常に合わせる（全ケースがNGにならないように）
render();
</script>
</body>
</html>
