<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToDo管理 — 自動化テスト比較用</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:#f2f4f8;color:#1c2333;display:flex;justify-content:center;padding:40px 14px;}
  .wrap{width:100%;max-width:560px;}
  h1{font-size:22px;font-weight:800;margin-bottom:6px;}
  p.lead{color:#5a6478;font-size:14px;margin-bottom:22px;line-height:1.6;}
  .cards{display:flex;flex-direction:column;gap:14px;}
  a.card{display:block;text-decoration:none;color:inherit;background:#fff;border-radius:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.08);padding:18px 20px;border:1px solid #eef1f6;transition:.15s;}
  a.card:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(0,0,0,.12);}
  a.card h2{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;}
  a.card .tag{font-size:11px;font-weight:800;border-radius:6px;padding:2px 8px;}
  .tag.ok{background:#e6f6ec;color:#1c7a3a;}
  .tag.bug{background:#fdeaea;color:#b23a48;}
  a.card p{color:#5a6478;font-size:13px;margin-top:6px;}
  .note{margin-top:22px;color:#8a93a6;font-size:12px;line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <h1>ToDo管理 — 自動化テスト比較用</h1>
  <p class="lead">同じToDoアプリの「正常版」と「セキュリティパッチで不具合が混入した版」です。<br>
    同一の自動テストを両方に流すと、パッチ版だけが失敗し、回帰（デグレ）を検知できます。</p>
  <div class="cards">
    <a class="card" href="normal/">
      <h2>正常版 <span class="tag ok">NORMAL</span></h2>
      <p>すべての機能が仕様どおりに動作します。</p>
    </a>
    <a class="card" href="patched/">
      <h2>パッチ版 <span class="tag bug">PATCHED</span></h2>
      <p>セキュリティパッチの副作用で、3箇所に不具合が混入しています。</p>
    </a>
  </div>
  <p class="note">用途：自動化テスト（E2E）の練習・比較用。両版をテスト対象にして、失敗したケースが「パッチが壊した箇所」です。</p>
</div>
</body>
</html>
